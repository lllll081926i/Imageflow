name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync --group build

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Python tests
        run: uv run python -m unittest discover -s backend/tests -v

      - name: Run Python engine tests
        run: uv run python -m unittest discover -s backend/tests/engines -v

      - name: Setup Inno Setup 6
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\Inno Setup 6"

      - name: Build Windows release packages
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: npm run build:release

      - name: Upload Windows packages
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: imageflow-windows-release
          path: |
            artifacts/release/ImageFlow-portable-*.zip
            artifacts/release/ImageFlow-setup-*.exe
          if-no-files-found: error
