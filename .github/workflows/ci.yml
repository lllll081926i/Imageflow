name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing release tag to upload cloud-built packages, for example v2.1.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync --group build

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Python tests
        # backend/tests/engines is a package, so a single discover covers API + engines.
        run: uv run python -m unittest discover -s backend/tests -v

      - name: Run Python engine tests
        # Keep an explicit engines-only step for targeted CI signal.
        run: uv run python -m unittest discover -s backend/tests/engines -v

      - name: Compile Python sources
        run: uv run python -m compileall backend

      - name: Check diff whitespace
        run: git diff --check

      - name: Setup Inno Setup 6
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\Inno Setup 6"

      - name: Build Windows release packages
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
        run: npm run build:release

      - name: Upload Windows packages
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
        uses: actions/upload-artifact@v7.0.1
        with:
          name: imageflow-windows-release
          path: |
            artifacts/release/ImageFlow-portable-*.zip
            artifacts/release/ImageFlow-setup-*.exe
          if-no-files-found: error

  publish-release-assets:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: windows-2025
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download Windows packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: imageflow-windows-release
          path: artifacts/release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: ${{ github.event_name != 'release' }}
          overwrite_files: true
          files: |
            artifacts/release/ImageFlow-portable-*.zip
            artifacts/release/ImageFlow-setup-*.exe
