name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python deps
        run: uv sync

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

      - name: Run Python tests
        run: uv run python -m unittest discover -s backend/python/tests

      - name: Setup Wails CLI
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        working-directory: backend
        shell: pwsh
        run: |
          $version = go list -m -f "{{.Version}}" github.com/wailsapp/wails/v2
          go install "github.com/wailsapp/wails/v2/cmd/wails@$version"
          $gopath = go env GOPATH
          Add-Content -Path $env:GITHUB_PATH -Value "$gopath/bin"

      - name: Setup NSIS
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          if (-not (Get-Command makensis.exe -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }

      - name: Prepare package artifacts
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Build single-file exe
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        working-directory: backend
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -clean
          Copy-Item "build/bin/ImageFlow.exe" "../artifacts/ImageFlow-single.exe" -Force

      - name: Build installer exe
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        working-directory: backend
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -nsis -clean
          $installer = Get-ChildItem "build/bin" -Filter "*installer.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            Write-Error "Installer exe not found in backend/build/bin"
            exit 1
          }
          Copy-Item $installer.FullName "../artifacts/ImageFlow-installer.exe" -Force

      - name: Upload Windows packages
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: imageflow-windows-exe
          path: artifacts/*.exe
          if-no-files-found: error
